version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kreditz_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kreditz_bankdata}
      POSTGRES_USER: ${POSTGRES_USER:-kreditz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kreditz_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kreditz} -d ${POSTGRES_DB:-kreditz_bankdata}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
